<script>
    // State Management
    let hearts = localStorage.getItem("currentHearts") ? parseInt(localStorage.getItem("currentHearts")) : 5;
    let attempts = localStorage.getItem("currentAttempts") ? parseInt(localStorage.getItem("currentAttempts")) : 0;
    let isLocked = false;
    let isTester = false;

    window.onload = function() {
        updateHearts();
        const lockUntil = localStorage.getItem("lockUntil");
        if (lockUntil && Date.now() < lockUntil) {
            const remaining = Math.ceil((lockUntil - Date.now()) / 1000);
            startCountdown(remaining);
        }
    };

    // Login Function
    function login(){
    if(isLocked) return;
    const user = document.getElementById("username").value.toLowerCase();
    const pass = document.getElementById("password").value.toLowerCase();
    const loginSection = document.getElementById("loginSection");

    // 1. Check Admin Passwords FIRST and return immediately
    if(pass === "shreec") {
        loginSection.style.display = "none";
        document.getElementById("adminView").style.display = "block";
        window.showVisits();
        return; // Exits the function, no lockout possible
    }
    
    if(pass === "dhanuc") {
        loginSection.style.display = "none";
        document.getElementById("adminView").style.display = "block";
        window.showAllMessages();
        return; // Exits the function, no lockout possible
    }

    // 2. Check Suraj Login
    if(user === "suraj"){
        if(pass === "autorides" || pass === "moonlight"){
            localStorage.removeItem("lockUntil");
            localStorage.removeItem("currentHearts");
            localStorage.removeItem("currentAttempts");

            if(pass === "moonlight") isTester = true;
            else window.trackVisit();
            loginSection.style.display = "none";
            document.getElementById("readBtn").style.display = "inline-block";
            return; 
        }
    }
    
    // 3. ONLY if all above fail, handle hearts and lockout
    if (hearts > 0) {
        hearts--; 
        attempts++; 
        localStorage.setItem("currentHearts", hearts);
        localStorage.setItem("currentAttempts", attempts);
        updateHearts(); 
        showHint();

        let lockDuration = hearts > 0 ? 15 : 60;
        let lockUntil = Date.now() + (lockDuration * 1000);
        localStorage.setItem("lockUntil", lockUntil);
        startCountdown(lockDuration);
    } else {
    document.getElementById("error").innerText = "Fuckkkk youuuu Surajj😒. Ask me now.";
    document.getElementById("error").style.display = "block";
    startCountdown(60);
}
}

    // UI Updates
    function updateHearts(){ 
        let h = Math.max(0, hearts);
        document.getElementById("hearts").innerText = "❤️".repeat(h) + "💔".repeat(5-h); 
    }

    function showHint(){
        const hints = ["9 letters", "we loved it so much", "Favourite memory fr", "My most fav pic of ours", "Nothing beats that"];
        const h = document.getElementById("hint");
        h.innerText = "Hint: " + (hints[attempts-1] || "Think harder!");
        h.style.display = "inline-block";
    }

    function startCountdown(seconds){
        isLocked = true;
        const error = document.getElementById("error");
        error.style.display = "block";

        let time = seconds;
        const interval = setInterval(() => {
            error.innerText = `Wait ${time}s before trying again ⏳`;
            time--;

            if(time < 0){
                clearInterval(interval);
                error.style.display = "none";
                isLocked = false;
            }
        }, 1000);
    }

    // Navigation
    function openIntro(){ document.getElementById("introScreen").style.display = "flex"; }
    function closeIntro(){
        document.getElementById("introScreen").style.display = "none";
        document.getElementById("memoriesSection").style.display = "block";
        window.dispatchEvent(new Event('scroll'));
    }

    function toggleSection(cid, bid, ot, ct){
        const c = document.getElementById(cid); const b = document.getElementById(bid);
        if(c.style.display === "none"){ c.style.display = "block"; b.innerText = ct; }
        else { c.style.display = "none"; b.innerText = ot; }
    }
    function toggleDraw(){ toggleSection("drawContent", "drawBtn", "Drawings 🤍", "Hide drawings 🤍"); }
    function openImg(src){ document.getElementById("imgPopup").style.display = "flex"; document.getElementById("popupImg").src = src; }
    function closeImg(){ document.getElementById("imgPopup").style.display = "none"; }

    // --- BIRTHDAY LOGIC ---
    const bdayMonth = 9; // October (0-indexed)
    const bdayDate = 1;  

    function updateBirthdayUI() {
        let today = new Date();
        if (today.getMonth() === bdayMonth && today.getDate() === bdayDate) {
            document.getElementById("bdayText").innerText = "🎉 OPEN!"; return; 
        }
        let bday = new Date(today.getFullYear(), bdayMonth, bdayDate);
        if (today > bday) bday.setFullYear(today.getFullYear() + 1);
        let diff = bday - today;
        let days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("bdayText").innerText = `🎂 ${days}d left`;
    }

    function openGift() {
        let t = new Date();
        if (t.getMonth() === bdayMonth && t.getDate() === bdayDate) window.location.href = "birthday.html";
        else alert("Patience... 🤍"); 
    }
    updateBirthdayUI();

    window.addEventListener("scroll", ()=>{
        document.querySelectorAll(".memoryBlock").forEach(el=>{
            if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add("show");
        });
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkvm3uc_KyxZFTM1UR2_p15HQZ6XydCrE",
      authDomain: "memories111-8bdaa.firebaseapp.com",
      projectId: "memories111-8bdaa",
      storageBucket: "memories111-8bdaa.appspot.com",
      messagingSenderId: "628477390391",
      appId: "1:628477390391:web:31821b5ae426e5a96f59b2",
      databaseURL: "https://memories111-8bdaa-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.trackVisit = async function(){
        const vRef = ref(db, "stats/visitCount");
        get(vRef).then((s) => { set(vRef, (s.val() || 0) + 1); });
    }

    window.saveMessage = async function(event) {
        const input = document.getElementById("userMsg");
        const btn = event.target; 
        const originalText = btn.innerText;

        if(!input.value.trim()) return alert("something to telll??😌");

        btn.disabled = true;
        btn.innerText = "Sending... 💌";
        btn.style.opacity = "0.5";

        try {
            await push(ref(db, "messages"), { 
                text: input.value, 
                time: new Date().toLocaleString(),
                sender: isTester ? "admin" : "user" 
            });
            alert("message sent! ❤️"); 
            input.value = ""; 
        } catch (err) {
            alert("Oops! Something went wrong.");
        } finally {
            btn.disabled = false;
            btn.innerText = originalText;
            btn.style.opacity = "1";
        }
    }

    window.showVisits = function() {
        onValue(ref(db, "stats/visitCount"), (s) => {
            document.getElementById("adminContent").innerHTML = `<h1 style='color:black; font-size:60px;'>${s.val() || 0}</h1>`;
        });
    }

    window.showAllMessages = function() {
        onValue(ref(db, "messages"), (s) => {
            let h = "";
            if(s.exists()){
                Object.values(s.val()).reverse().forEach(m => {
                    // Gray for your tests, White for his real messages
                    const bgColor = (m.sender === "admin") ? "#e0e0e0" : "#ffffff";
                    const label = (m.sender === "admin") ? "🛠️ TEST:" : "💌 FROM HIM:";

                    h += `<div class="msgItem" style="background: ${bgColor}; border: 1px solid #ccc; color: black; padding: 10px; margin-bottom: 5px; border-radius: 8px;">
                            <small style="color: #666;">${label} ${m.time}</small><br>
                            <strong>${m.text}</strong>
                          </div>`;
                });
            } else { h = "No notes yet."; }
            document.getElementById("adminContent").innerHTML = h;
        });
    }
</script>
