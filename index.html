<!DOCTYPE html>
<html lang="en">
<head>
    <title>For You 🤍</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --maroon: #4a0404;
            --gold: #d4af37;
            --glass: rgba(20, 20, 20, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            text-align: center;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("images/sky.jpeg");
            background-size: cover;
            background-attachment: fixed;
            color: #eee;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Animated Heart Background */
        .heart-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .floating-heart {
            position: absolute;
            color: var(--maroon);
            opacity: 0.4;
            animation: float 12s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); }
            100% { transform: translateY(-10vh) rotate(360deg); }
        }

        h2, h3 { font-family: 'Playfair Display', serif; color: var(--gold); }

        input { padding: 12px; margin: 8px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: white; width: 80%; max-width: 300px; }
        
        button { 
            padding: 12px 20px; cursor: pointer; border-radius: 8px; border: none; 
            transition: 0.3s; background: var(--maroon); color: var(--gold); 
            font-weight: bold; text-transform: uppercase;
        }
        button:hover { background: #6b0606; transform: scale(1.05); }

        #loginSection { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        
        #hint, #error {
            display: none; margin: 15px auto; padding: 12px; border-radius: 12px;
            background: rgba(74, 4, 4, 0.5); border: 1px solid var(--maroon); width: fit-content;
        }

        #readBtn {
            display:none; margin: 40px auto; border-radius: 50px;
            background: var(--maroon); color: var(--gold); padding: 15px 40px;
            border: 1px solid var(--gold); font-size: 1.1rem;
        }

        #introScreen {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background:black; display:none; justify-content:center; align-items:center; z-index:9999;
        }

        #memoriesSection { display:none; margin-top:40px; padding-bottom: 120px; }
        
        .memoryBlock {
            opacity:0; transform:translateY(30px); transition:0.8s;
            margin: 0 auto 30px auto; padding: 20px; width: 90%; max-width: 550px;
            background: var(--glass); border-radius: 15px; border: 1px solid #222;
        }
        .memoryBlock.show { opacity:1; transform:translateY(0); }
        .photo { width:100%; border-radius:10px; cursor:pointer; border: 1px solid #333; }
        
        .sideBySide { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 10px; }
        .sideImg { width: 140px; border-radius: 8px; cursor: pointer; }

        /* FIXED BIRTHDAY BUTTON TO BOTTOM RIGHT */
        #bdayContainer {
            position: fixed; bottom: 20px; right: 20px;
            width: 100px; text-align: center; z-index: 100000;
        }
        #bdayBtn {
            width: 70px; height: 70px; font-size: 35px; border-radius: 50%;
            background: var(--maroon); border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(74, 4, 4, 0.8);
        }
        #bdayText {
            margin-top: 5px; font-size: 10px; color: var(--gold);
            background: rgba(0,0,0,0.8); padding: 4px; border-radius: 5px;
        }

        #imgPopup {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:10000;
        }
        #popupImg { max-width:90%; max-height:90%; border: 2px solid var(--gold); }
    </style>
</head>

<script>
    let hearts = 5;
    let attempts = 0;
    let isLocked = false;
    let isTester = false;

    // Background Hearts Script
    const container = document.getElementById('heartContainer');
    for (let i = 0; i < 15; i++) {
        const h = document.createElement('div');
        h.className = 'floating-heart';
        h.innerHTML = '❤️';
        h.style.left = Math.random() * 100 + '%';
        h.style.animationDelay = Math.random() * 10 + 's';
        h.style.fontSize = (Math.random() * 20 + 15) + 'px';
        container.appendChild(h);
    }

    function login(){
        if(isLocked) return;
        const user = document.getElementById("username").value.toLowerCase();
        const pass = document.getElementById("password").value.toLowerCase();
        const error = document.getElementById("error");
        const loginSection = document.getElementById("loginSection");

        if(pass === "shreec" || pass === "dhanuc") {
            loginSection.style.display = "none";
            document.getElementById("adminView").style.display = "block";
            if(pass === "shreec") window.showVisits();
            else window.showAllMessages();
            return;
        }

        if(user === "suraj"){
            if(pass === "autorides" || pass === "moonlight"){
                if(pass === "moonlight") isTester = true;
                else window.trackVisit();
                loginSection.style.display = "none";
                document.getElementById("readBtn").style.display = "block";
                return;
            }
        }
        
        hearts--; attempts++; updateHearts(); showHint();
        startCountdown(hearts > 0 ? 15 : 120);
    }

    function updateHearts(){ document.getElementById("hearts").innerText = "❤️".repeat(hearts) + "💔".repeat(5-hearts); }
    function showHint(){
        const hints = ["9 letters", "we loved it", "Favourite memory", "My first fav photo", "Nothing beats that"];
        document.getElementById("hint").innerText = "Hint: " + (hints[attempts-1] || "Think harder!");
        document.getElementById("hint").style.display = "block";
    }

    function startCountdown(seconds){
        isLocked = true; document.getElementById("loginBtn").disabled = true;
        let sec = seconds;
        let itv = setInterval(()=>{
            sec--;
            const err = document.getElementById("error");
            err.style.display = "block";
            err.innerText = hearts <= 0 ? "Ask Dhanu... 💔" : `Wait ${sec}s ⏳`;
            if(sec <= 0){ clearInterval(itv); isLocked = false; document.getElementById("loginBtn").disabled = false; err.innerText = "Try again..."; }
        },1000);
    }

    function openIntro(){ document.getElementById("introScreen").style.display = "flex"; }
    function closeIntro(){
        document.getElementById("introScreen").style.display = "none";
        document.getElementById("memoriesSection").style.display = "block";
        window.dispatchEvent(new Event('scroll'));
    }

    function toggleSection(cid, bid, ot, ct){
        const c = document.getElementById(cid); const b = document.getElementById(bid);
        if(c.style.display === "none") { c.style.display = "block"; b.innerText = ct; }
        else { c.style.display = "none"; b.innerText = ot; }
    }
    function toggleDraw(){ toggleSection("drawContent", "drawBtn", "Drawings 🤍", "Hide drawings 🤍"); }
    function openImg(src){ document.getElementById("imgPopup").style.display = "flex"; document.getElementById("popupImg").src = src; }
    function closeImg(){ document.getElementById("imgPopup").style.display = "none"; }

    const bdayMonth = 9; const bdayDate = 1;  
    function updateBirthdayUI() {
        let today = new Date();
        let bday = new Date(today.getFullYear(), bdayMonth, bdayDate);
        if (today > bday) bday.setFullYear(today.getFullYear() + 1);
        let diff = bday - today;
        let d = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("bdayText").innerText = (today.getMonth() === bdayMonth && today.getDate() === bdayDate) ? "🎉 OPEN NOW!" : `🎂 ${d} days left`;
    }
    function openGift() {
        let t = new Date();
        if (t.getMonth() === bdayMonth && t.getDate() === bdayDate) window.location.href = "birthday.html";
        else alert("Patience... 🤍"); 
    }
    updateBirthdayUI();

    window.addEventListener("scroll", ()=>{
        document.querySelectorAll(".memoryBlock").forEach(el=>{
            if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add("show");
        });
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkvm3uc_KyxZFTM1UR2_p15HQZ6XydCrE",
      authDomain: "memories111-8bdaa.firebaseapp.com",
      projectId: "memories111-8bdaa",
      storageBucket: "memories111-8bdaa.appspot.com",
      messagingSenderId: "628477390391",
      appId: "1:628477390391:web:31821b5ae426e5a96f59b2",
      databaseURL: "https://memories111-8bdaa-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.trackVisit = async function(){
        const vRef = ref(db, "stats/visitCount");
        get(vRef).then((s) => { set(vRef, (s.val() || 0) + 1); });
    }

    window.saveMessage = async function() {
        const input = document.getElementById("userMsg");
        if(!input.value.trim()) return alert("Say something! ❤️");
        await push(ref(db, "messages"), { text: input.value, time: new Date().toLocaleString() });
        alert("Sent! ❤️"); input.value = "";
    }

    window.showVisits = function() {
        onValue(ref(db, "stats/visitCount"), (s) => {
            document.getElementById("adminContent").innerHTML = `<h1 style='color:#d4af37; font-size:60px;'>${s.val() || 0}</h1>`;
        });
    }

    window.showAllMessages = function() {
        onValue(ref(db, "messages"), (s) => {
            let h = "";
            if(s.exists()){
                Object.values(s.val()).reverse().forEach(m => {
                    h += `<div style="border-bottom:1px solid #333; padding:10px; color:#eee;"><b>${m.time}:</b><br>${m.text}</div>`;
                });
            }
            document.getElementById("adminContent").innerHTML = h || "No notes yet.";
        });
    }
</script>
