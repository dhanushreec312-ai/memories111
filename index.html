<!DOCTYPE html>
<html>
<head>
    <title>For You</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
            background: url("images/sky.jpeg") no-repeat center center fixed;
            background-size: cover;
            color: white; 
        }
        
        /* Our Memories title in Black */
        h2 { 
            color: #000000 !important; 
            background: none !important;
            border: none !important;
        }

        input { padding: 10px; margin: 5px; border-radius: 8px; border: none; color: black; }
        
        button { 
            padding: 10px 15px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            transition: 0.3s; 
            background: #000000; 
            color: #ffffff; 
        }
        button:hover { opacity: 0.8; }

        /* Read Me text in Black (overriding button default for this specific one) */
        #readBtn {
            display:none;
            margin-top:40px;
            background: none;
            color: #000000 !important;
            font-weight: bold;
            font-size: 18px;
            border: none;
        }

        #hearts { margin-top:10px; font-size:20px; }
        
        #hint, #error {
            display: none;
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            color: white;
        }

        #memoriesSection { display:none; margin-top:40px; padding-bottom: 120px; }
        
        .memoryBlock {
            opacity:0;
            transform:translateY(30px);
            transition:0.6s;
            margin-bottom: 30px;
        }
        .memoryBlock.show { opacity:1; transform:translateY(0); }
        .photo { width:90%; max-width:500px; border-radius:12px; cursor:pointer; }
        
        #bdayContainer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 100px;
            text-align: center;
            z-index: 99999;
        }
        #bdayBtn {
            width: 75px; height: 75px;
            font-size: 38px; border-radius: 50%;
            background: #000000; border: 2px solid white;
        }
        #bdayText {
            margin-top:5px; font-size:11px; color:white;
            background: rgba(0,0,0,0.7); padding:4px; border-radius:8px;
        }

        #imgPopup {
            display:none; position:fixed; top:0; left:0;
            width:100%; height:100%; background:rgba(0,0,0,0.9);
            justify-content:center; align-items:center; z-index:10000;
        }
        #popupImg { max-width:90%; max-height:90%; border-radius:10px; }
    </style>
</head>

<body>

<div id="bdayContainer">
    <button id="bdayBtn" onclick="openGift()">🎂</button>
    <div id="bdayText"></div>
</div>

<div id="loginSection">
    <h2>Our Memories</h2>
    <input id="username" placeholder="Username"><br>
    <input id="password" type="password" placeholder="Password"><br>
    <button id="loginBtn" onclick="login()">Unlock</button>
    <div id="hearts">❤️❤️❤️❤️❤️</div>
    <div id="hint"></div>
    <div id="error"></div>
</div>

<button id="readBtn" onclick="openIntro()">Read me 🤍</button>

<div id="memoriesSection">
    <h2 style="color: black !important;">Our memories 🤍</h2>
    <div class="memoryBlock"><img src="images/letter.png" class="photo" onclick="openImg(this.src)"></div>
    </div>

<div id="imgPopup" onclick="closeImg()">
    <img id="popupImg">
</div>

<script>
    let hearts = 5;
    let attempts = 0;
    let isLocked = false;

    // ANTI-REFRESH LOGIC: Runs when page loads
    window.onload = function() {
        const lockTime = localStorage.getItem("lockUntil");
        if (lockTime && Date.now() < lockTime) {
            const remaining = Math.ceil((lockTime - Date.now()) / 1000);
            startCountdown(remaining);
        }
        
        if (localStorage.getItem("currentHearts")) {
            hearts = parseInt(localStorage.getItem("currentHearts"));
            updateHearts();
        }
    };

    function login(){
        if(isLocked) return;
        const user = document.getElementById("username").value.toLowerCase();
        const pass = document.getElementById("password").value.toLowerCase();
        
        if(user === "suraj" && (pass === "autorides" || pass === "moonlight")){
            localStorage.removeItem("lockUntil");
            localStorage.removeItem("currentHearts");
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("readBtn").style.display = "inline-block";
            return;
        }
        
        hearts--; 
        attempts++; 
        localStorage.setItem("currentHearts", hearts);
        updateHearts(); 
        showHint();

        const lockDuration = hearts > 0 ? 15 : 120;
        const lockUntil = Date.now() + (lockDuration * 1000);
        localStorage.setItem("lockUntil", lockUntil);
        
        startCountdown(lockDuration);
    }

    function updateHearts(){ document.getElementById("hearts").innerText = "❤️".repeat(hearts) + "💔".repeat(5-hearts); }
    
    function showHint(){
        const hints = ["9 letters", "we loved it", "Favourite memory", "My first fav photo", "Nothing beats that"];
        const h = document.getElementById("hint");
        h.innerText = "Hint: " + (hints[attempts-1] || "Think harder!");
        h.style.display = "inline-block";
    }

    function startCountdown(seconds){
        isLocked = true; 
        document.getElementById("loginBtn").disabled = true;
        let sec = seconds;
        
        const interval = setInterval(() => {
            sec--;
            const e = document.getElementById("error");
            e.style.display = "inline-block";
            e.innerText = `Wait ${sec}s ⏳`;
            
            if (sec <= 0) {
                clearInterval(interval); 
                isLocked = false;
                document.getElementById("loginBtn").disabled = false;
                e.style.display = "none";
                localStorage.removeItem("lockUntil");
            }
        }, 1000);
    }

    function openIntro(){ 
        document.getElementById("readBtn").style.display = "none";
        document.getElementById("memoriesSection").style.display = "block";
        window.dispatchEvent(new Event('scroll'));
    }

    function openImg(src){ document.getElementById("imgPopup").style.display = "flex"; document.getElementById("popupImg").src = src; }
    function closeImg(){ document.getElementById("imgPopup").style.display = "none"; }

    function updateBirthdayUI() {
        let today = new Date();
        let bday = new Date(today.getFullYear(), 8, 1); 
        if (today > bday) bday.setFullYear(today.getFullYear() + 1);
        let diff = bday - today;
        let days = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("bdayText").innerText = `🎂 ${days}d left`;
    }
    updateBirthdayUI();

    window.addEventListener("scroll", ()=>{
        document.querySelectorAll(".memoryBlock").forEach(el=>{
            if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add("show");
        });
    });
</script>
</body>
</html>
