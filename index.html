<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>For You 🤍</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RE-DESIGN - DARK ROMANTIC THEME */
        :root {
            --bg-dark: #0f0f0f;
            --maroon-deep: #4a0404;
            --maroon-bright: #800000;
            --gold: #d4af37;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            text-align: center;
            background: var(--bg-dark);
            background-image: linear-gradient(rgba(15, 15, 15, 0.8), rgba(15, 15, 15, 0.8)), url("images/sky.jpeg");
            background-attachment: fixed;
            background-size: cover;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Animated Floating Background */
        .bg-elements {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
        }
        .bg-heart {
            position: absolute;
            color: var(--maroon-bright);
            opacity: 0.3;
            animation: floatUp 10s infinite ease-in;
        }
        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        /* Headers */
        h1, h2, h3 { 
            font-family: 'Playfair Display', serif; 
            color: var(--gold); 
            letter-spacing: 1px;
        }

        /* Login Section Style */
        #loginSection {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid var(--maroon-deep);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 85%;
            max-width: 350px;
        }

        input { 
            padding: 12px; 
            margin: 8px 0; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #1a1a1a;
            color: white;
            width: 100%;
            box-sizing: border-box;
        }

        button { 
            padding: 12px 20px; 
            cursor: pointer; 
            border-radius: 8px; 
            border: none; 
            transition: 0.4s; 
            background: var(--maroon-deep);
            color: var(--gold);
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
        }
        button:hover { background: var(--maroon-bright); transform: scale(1.02); }

        #hearts { margin-top:15px; font-size:22px; filter: drop-shadow(0 0 5px var(--maroon-bright)); }
        
        #hint, #error {
            display: none; margin-top: 15px; padding: 12px;
            border-radius: 10px; background: rgba(74, 4, 4, 0.4);
            border: 1px solid var(--maroon-bright); font-size: 14px;
        }

        /* Read Me Button */
        #readBtn {
            display:none;
            margin: 40px auto;
            border-radius: 50px;
            background: var(--maroon-deep);
            color: var(--gold);
            padding: 18px 40px;
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            border: 1px solid var(--gold);
        }

        /* Memories Section Styles */
        #memoriesSection { display:none; padding: 20px; }
        
        .memoryBlock {
            opacity:0; transform:translateY(30px); transition:0.8s;
            margin-bottom: 40px;
            background: rgba(20, 20, 20, 0.6);
            padding: 15px;
            border-radius: 15px;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }
        .memoryBlock.show { opacity:1; transform:translateY(0); }
        .photo { width:100%; max-width:500px; border-radius:10px; border: 1px solid #333; }
        
        /* Interactive Buttons in Content */
        .memoryBlock button {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            width: auto;
            padding: 10px 25px;
        }

        /* Note Section */
        .note-card {
            background: linear-gradient(145deg, #1a0202, #2a2a2a);
            border: 1px solid var(--maroon-bright);
            padding: 25px;
            border-radius: 20px;
            margin: 20px auto;
        }

        /* Birthday Button Fix - Bottom Right */
        #bdayContainer {
            position: fixed;
            bottom: 25px;
            right: 20px;
            width: 80px;
            z-index: 99999;
        }
        #bdayBtn {
            width: 65px; height: 65px; font-size: 30px;
            border-radius: 50%;
            background: var(--maroon-deep);
            border: 2px solid var(--gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            display: flex; align-items: center; justify-content: center;
        }
        #bdayText {
            margin-top: 5px; font-size: 9px; font-weight: bold;
            color: var(--gold); background: rgba(0,0,0,0.8);
            padding: 3px; border-radius: 5px;
        }

        /* Popups */
        #imgPopup {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%;
            background:rgba(0,0,0,0.95); justify-content:center; align-items:center; z-index:10000;
        }
        #popupImg { max-width:95%; max-height:90%; border: 2px solid var(--gold); }

        #introScreen {
            position:fixed; top:0; left:0; width:100%; height:100%;
            background: black; display:none; justify-content:center; align-items:center; z-index:9999;
        }
    </style>
</head>

<body>

<div class="bg-elements" id="bgHearts"></div>

<div id="bdayContainer">
    <button id="bdayBtn" onclick="openGift()">🎂</button>
    <div id="bdayText"></div>
</div>

<div id="loginSection">
    <div class="login-card">
        <h2>Our Memories</h2>
        <input id="username" placeholder="Username"><br>
        <input id="password" type="password" placeholder="Password"><br>
        <button id="loginBtn" onclick="login()">Unlock Memories</button>
        <div id="hearts">❤️❤️❤️❤️❤️</div>
        <div id="hint"></div>
        <div id="error"></div>
    </div>
</div>

<div id="adminView" style="display:none; padding:20px; background:rgba(0,0,0,0.9);">
    <h2 id="adminTitle">Admin Dashboard</h2>
    <div id="adminContent"></div>
    <br>
    <button onclick="location.reload()" style="background:#444;">Logout</button>
</div>

<button id="readBtn" onclick="openIntro()">Read me 🤍</button>

<div id="introScreen" onclick="closeIntro()">
    <img src="images/intro.png" id="introImage" style="max-width:90%; border-radius:15px;">
</div>

<div id="memoriesSection">
    <div class="memoryBlock note-card">
        <h3>Leave a note for me 🤍</h3>
        <input id="userMsg" placeholder="Type your heart out..." style="width:90%;"><br>
        <button onclick="saveMessage()">Send to her 🤍</button>
    </div>

    <h2>Our Journey 🤍</h2>

    <div class="memoryBlock"><img src="images/letter.png" class="photo" onclick="openImg(this.src)"></div>

    <div class="memoryBlock">
        <button onclick="toggleDraw()" id="drawBtn">Drawings 🤍</button>
        <div id="drawContent" style="display:none; margin-top:15px;">
            <div style="display:flex; justify-content:center; gap:10px;">
                <img src="images/draw1.png" style="width:140px; border-radius:8px;" onclick="openImg(this.src)">
                <img src="images/draw2.png" style="width:140px; border-radius:8px;" onclick="openImg(this.src)">
            </div>
        </div>
    </div>

    <div class="memoryBlock"><img src="images/forward.png" class="photo" onclick="openImg(this.src)"></div>
    <div class="memoryBlock"><img src="images/2024.png" class="photo" onclick="openImg(this.src)"></div>
    <div class="memoryBlock"><img src="images/start.png" class="photo" onclick="openImg(this.src)"></div>

    <div class="memoryBlock">
        <button onclick="toggleSection('augContent', 'augBtn', 'Aug memories 🤍', 'Hide Aug 🤍')" id="augBtn">Aug memories 🤍</button>
        <div id="augContent" style="display:none; margin-top:15px;">
            <div style="display:flex; justify-content:center; gap:10px;">
                <img src="images/aug.png" style="width:140px; border-radius:8px;" onclick="openImg(this.src)">
                <img src="images/aug1.png" style="width:140px; border-radius:8px;" onclick="openImg(this.src)">
            </div>
        </div>
    </div>

    <div class="memoryBlock">
        <button onclick="toggleSection('NovContent', 'NovBtn', 'Nov memories 🤍', 'Hide Nov 🤍')" id="NovBtn">Nov memories 🤍</button>
        <div id="NovContent" style="display:none; margin-top:15px;">
            <div style="display:flex; justify-content:center; gap:10px;">
                <img src="images/nov1.png" style="width:140px; border-radius:8px;" onclick="openImg(this.src)">
                <img src="images/nov2.png" style="width:140px; border-radius:8px;" onclick="openImg(this.src)">
            </div>
        </div>
    </div>

    <div class="memoryBlock"><img src="images/order1.png" class="photo" onclick="openImg(this.src)"></div>
    <div class="memoryBlock"><img src="images/drunk.png" class="photo" onclick="openImg(this.src)"></div>

    <div class="memoryBlock">
        <button onclick="toggleSection('Dec4Content', 'Dec4Btn', 'Dec 4 memories 🤍', 'Hide Dec4 🤍')" id="Dec4Btn">Dec 4 memories 🤍</button>
        <div id="Dec4Content" style="display:none; margin-top:15px;">
            <img src="images/soft.png" style="width:140px;" onclick="openImg(this.src)">
            <img src="images/ticket.png" style="width:140px;" onclick="openImg(this.src)">
        </div>
    </div>

    <div class="memoryBlock">
        <button onclick="toggleSection('Dec5Content', 'Dec5Btn', 'Dec 5 memories 🤍', 'Hide Dec5 🤍')" id="Dec5Btn">Dec 5 memories 🤍</button>
        <div id="Dec5Content" style="display:none; margin-top:15px;">
            <img src="images/dec51.png" style="width:130px; margin:5px;" onclick="openImg(this.src)">
            <img src="images/dec52.png" style="width:130px; margin:5px;" onclick="openImg(this.src)">
            <img src="images/dec53.png" style="width:130px; margin:5px;" onclick="openImg(this.src)">
            <img src="images/dec54.png" style="width:130px; margin:5px;" onclick="openImg(this.src)">
        </div>
    </div>

    <div class="memoryBlock">
        <button onclick="toggleSection('Dec6Content', 'Dec6Btn', 'Dec 6 memories 🤍', 'Hide Dec6 🤍')" id="Dec6Btn">Dec 6 memories 🤍</button>
        <div id="Dec6Content" style="display:none; margin-top:15px;">
            <img src="images/dec61.png" style="width:140px;" onclick="openImg(this.src)">
            <img src="images/dec62.png" style="width:140px;" onclick="openImg(this.src)">
        </div>
    </div>

    <div class="memoryBlock">
        <button onclick="toggleSection('byeContent', 'byeBtn', 'BYE BYE 🤍', 'close me 🤍')" id="byeBtn">BYE BYE 🤍</button>
        <div id="byeContent" style="display:none;"><img src="images/bye.png" class="photo" onclick="openImg(this.src)"></div>
    </div>
</div>

<div id="imgPopup" onclick="closeImg()">
    <img id="popupImg">
</div>

<script>
    /* ALL YOUR ORIGINAL LOGIC IS PRESERVED */
    let hearts = 5;
    let attempts = 0;
    let isLocked = false;
    let isTester = false; 

    // Create Background Hearts
    const bgContainer = document.getElementById('bgHearts');
    for (let i = 0; i < 15; i++) {
        const h = document.createElement('div');
        h.className = 'bg-heart';
        h.innerHTML = '❤️';
        h.style.left = Math.random() * 100 + '%';
        h.style.animationDelay = Math.random() * 10 + 's';
        h.style.fontSize = (Math.random() * 20 + 10) + 'px';
        bgContainer.appendChild(h);
    }

    function login(){
        if(isLocked) return;
        const user = document.getElementById("username").value.toLowerCase();
        const pass = document.getElementById("password").value.toLowerCase();
        const error = document.getElementById("error");
        
        if(pass === "shreec" || pass === "dhanuc") {
            document.getElementById("loginSection").style.display = "none";
            document.getElementById("adminView").style.display = "block";
            if(pass === "shreec") window.showVisits();
            else window.showAllMessages();
            return;
        }

        if(user === "suraj"){
            if(pass === "autorides" || pass === "moonlight"){
                if(pass === "moonlight") isTester = true;
                else window.trackVisit();
                document.getElementById("loginSection").style.display = "none";
                document.getElementById("readBtn").style.display = "block";
                return;
            }
        }
        
        hearts--; attempts++; updateHearts(); showHint();
        startCountdown(hearts > 0 ? 15 : 120);
    }

    function updateHearts(){ document.getElementById("hearts").innerText = "❤️".repeat(hearts) + "💔".repeat(5-hearts); }
    function showHint(){
        const hints = ["9 letters", "we loved it", "Favourite memory", "My first fav photo", "Nothing beats that"];
        const h = document.getElementById("hint");
        h.innerText = "Hint: " + (hints[attempts-1] || "Think harder!");
        h.style.display = "block";
    }

    function startCountdown(s){
        isLocked = true; document.getElementById("loginBtn").disabled = true;
        let sec = s;
        let timer = setInterval(()=>{
            sec--;
            const err = document.getElementById("error");
            err.style.display = "block";
            err.innerText = hearts <= 0 ? "Ask Dhanu for help now... 💔" : `Wait ${sec}s ⏳`;
            if(sec <= 0){ clearInterval(timer); isLocked = false; document.getElementById("loginBtn").disabled = false; err.innerText = "Try again..."; }
        },1000);
    }

    function openIntro(){ document.getElementById("introScreen").style.display = "flex"; }
    function closeIntro(){
        document.getElementById("introScreen").style.display = "none";
        document.getElementById("memoriesSection").style.display = "block";
        window.dispatchEvent(new Event('scroll'));
    }

    function toggleSection(cid, bid, ot, ct){
        const c = document.getElementById(cid); const b = document.getElementById(bid);
        if(c.style.display === "none") { c.style.display = "block"; b.innerText = ct; }
        else { c.style.display = "none"; b.innerText = ot; }
    }
    function toggleDraw(){ toggleSection("drawContent", "drawBtn", "Drawings 🤍", "Hide drawings 🤍"); }
    function openImg(src){ document.getElementById("imgPopup").style.display = "flex"; document.getElementById("popupImg").src = src; }
    function closeImg(){ document.getElementById("imgPopup").style.display = "none"; }

    const bdayMonth = 9; const bdayDate = 1;  
    function updateBirthdayUI() {
        let today = new Date();
        let bday = new Date(today.getFullYear(), bdayMonth, bdayDate);
        if (today > bday) bday.setFullYear(today.getFullYear() + 1);
        let diff = bday - today;
        let d = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById("bdayText").innerText = (today.getMonth() === bdayMonth && today.getDate() === bdayDate) ? "🎉 OPEN NOW!" : `🎂 ${d} days left`;
    }
    function openGift() {
        let t = new Date();
        if (t.getMonth() === bdayMonth && t.getDate() === bdayDate) window.location.href = "birthday.html";
        else alert("Patience, my love... 🤍"); 
    }
    updateBirthdayUI();

    window.addEventListener("scroll", ()=>{
        document.querySelectorAll(".memoryBlock").forEach(el=>{
            if(el.getBoundingClientRect().top < window.innerHeight - 50) el.classList.add("show");
        });
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkvm3uc_KyxZFTM1UR2_p15HQZ6XydCrE",
      authDomain: "memories111-8bdaa.firebaseapp.com",
      projectId: "memories111-8bdaa",
      storageBucket: "memories111-8bdaa.appspot.com",
      messagingSenderId: "628477390391",
      appId: "1:628477390391:web:31821b5ae426e5a96f59b2",
      databaseURL: "https://memories111-8bdaa-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.trackVisit = async function(){
        const vRef = ref(db, "stats/visitCount");
        get(vRef).then((s) => { set(vRef, (s.val() || 0) + 1); });
    }

    window.saveMessage = async function() {
        const input = document.getElementById("userMsg");
        if(!input.value.trim()) return alert("Say something! ❤️");
        await push(ref(db, "messages"), { text: input.value, time: new Date().toLocaleString() });
        alert("Sent! ❤️"); input.value = "";
    }

    window.showVisits = function() {
        onValue(ref(db, "stats/visitCount"), (s) => {
            document.getElementById("adminContent").innerHTML = `<h1 style='color:#d4af37; font-size:60px;'>${s.val() || 0}</h1>`;
        });
    }

    window.showAllMessages = function() {
        onValue(ref(db, "messages"), (s) => {
            let h = "";
            if(s.exists()){
                Object.values(s.val()).reverse().forEach(m => {
                    h += `<div style="border-bottom:1px solid #333; padding:10px; color:#e0e0e0;"><b>${m.time}:</b><br>${m.text}</div>`;
                });
            }
            document.getElementById("adminContent").innerHTML = h || "No notes yet.";
        });
    }
</script>

</body>
</html>
