<!DOCTYPE html>

    <style>
        body{
            font-family: Arial;

            background-size: cover;
            color: white;
        }
        input{ padding: 10px; margin: 5px; border-radius: 8px; border: none; }
        button{ padding: 10px 15px; cursor: pointer; border-radius: 8px; border: none; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        #hearts{ margin-top:10px; font-size:20px; }
        #hint, #error{
            display: none;
            margin-top: 10px;
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(5px);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }
        #hint{ color:#fff; }
        #error{ color:#ffb3b3; }
        #readBtn{
            display:none;
            margin-top:40px;
            border-radius:25px;
            background:rgba(255,255,255,0.2);
            color: white;
            padding: 15px 30px;
        }
        #introScreen{
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:black;
            display:none;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }
        #introImage{ max-width:90%; max-height:90%; border-radius:15px; }
        #memoriesSection{ display:none; margin-top:40px; padding-bottom: 100px; }
        
        .memoryBlock{
            opacity:0;
            transform:translateY(30px);
            transition:0.6s;
            margin-bottom: 30px;
        }
        .memoryBlock.show{ opacity:1; transform:translateY(0); }
        .photo{ width:90%; max-width:500px; border-radius:12px; cursor:pointer; }
        .sideBySide{
            display:grid;
            justify-content:center;
            gap:20px;
            grid-template-columns:repeat(2,auto);
            margin-top: 10px;
        }
        .sideImg{ width:150px; border-radius:12px; cursor:pointer; }
        .groupClose{ font-size:20px; cursor:pointer; display: block; margin-bottom: 10px; }
        
        #bdayContainer {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 140px;
            text-align: center;
            z-index: 99999;
        }
        #bdayBtn{
            width:100%;
            height:95px;
            font-size:45px;
            border-radius:18px;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4);
            box-shadow: 0 0 25px rgba(255,150,150,0.9);
        }
        #bdayText{
            margin-top:8px;
            font-size:13px;
            color:white;
            background: rgba(0,0,0,0.6);
            padding:4px 8px;
            border-radius:8px;
        }
        #imgPopup{
            display:none;
            position:fixed;
            top:0; left:0;
            width:100%; height:100%;
            background:rgba(0,0,0,0.9);
            justify-content:center;
            align-items:center;
            z-index:10000;
        }
        #popupImg{ max-width:90%; max-height:90%; border-radius:10px; }

        #adminView {
            display: none;
            background: rgba(0,0,0,0.85);
            padding: 20px;
            border-radius: 15px;
            margin: 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }
        .msgItem { border-bottom: 1px solid #444; padding: 15px; text-align: left; }
    </style>

<script>
    let hearts = 5;
    let attempts = 0;
    let isLocked = false;
    let isTester = false; 

    function login(){
        if(isLocked) return;
        const user = document.getElementById("username").value.toLowerCase();
        const pass = document.getElementById("password").value.toLowerCase();
        const error = document.getElementById("error");
        const loginSection = document.getElementById("loginSection");
        const readBtn = document.getElementById("readBtn");

        error.style.display = "none";

        // Separate Admin Logins
        if(pass === "shreec") {
            loginSection.style.display = "none";
            document.getElementById("adminView").style.display = "block";
            window.showVisits();
            return;
        }
        if(pass === "dhanuc") {
            loginSection.style.display = "none";
            document.getElementById("adminView").style.display = "block";
            window.showAllMessages();
            return;
        }

        // Suraj / Tester Logins
        if(user === "suraj"){
            if(pass === "autorides" || pass === "moonlight"){
                if(pass === "moonlight") {
                    isTester = true;
                    alert("Tester mode: Visits won't count! 🌙");
                } else {
                    isTester = false;
                    alert("...you remembered 🥹");
                    window.trackVisit(); 
                }
                loginSection.style.display = "none";
                readBtn.style.display = "inline-block";
                return;
            }
        } else if (user !== "" && user !== "suraj") {
            showError("Wrong username 😤");
            return;
        }

        hearts--;
        attempts++;
        updateHearts();
        showHint();
        if(hearts > 0) startCountdown(15);
        else startCountdown(120);
    }

    function updateHearts(){
        document.getElementById("hearts").innerText = "❤️".repeat(hearts) + "💔".repeat(5-hearts);
    }

    function showHint(){
        const hints = ["9 letters", "we loved it", "Favourite memory", "My first fav photo", "Nothing beats that"];
        const hintDiv = document.getElementById("hint");
        hintDiv.innerText = "Hint: " + (hints[attempts-1] || "Think harder!");
        hintDiv.style.display = "inline-block";
    }

    function showError(msg){
        const errorDiv = document.getElementById("error");
        errorDiv.innerText = msg;
        errorDiv.style.display = "inline-block";
    }

    function startCountdown(seconds){
        isLocked = true;
        document.getElementById("loginBtn").disabled = true;
        let sec = seconds;
        let interval = setInterval(()=>{
            sec--;
            showError(hearts <= 0 ? "fuck u surajjjjjj ask me now 😭💔" : `Wait ${sec}s ⏳`);
            if(sec <= 0){
                clearInterval(interval);
                isLocked = false;
                document.getElementById("loginBtn").disabled = false;
                if(hearts > 0) showError("Try again… 💛");
            }
        },1000);
    }

    function openIntro(){ document.getElementById("introScreen").style.display = "flex"; }
    function closeIntro(){
        document.getElementById("introScreen").style.display = "none";
        document.getElementById("memoriesSection").style.display = "block";
        window.dispatchEvent(new Event('scroll'));
    }

    function toggleSection(contentId, btnId, openText, closeText){
        const c = document.getElementById(contentId);
        const b = document.getElementById(btnId);
        if(c.style.display === "none"){
            c.style.display = "block";
            b.innerText = closeText;
        } else {
            c.style.display = "none";
            b.innerText = openText;
        }
    }

    function toggleDraw(){ toggleSection("drawContent", "drawBtn", "Drawings 🤍", "Hide drawings 🤍"); }
    function openImg(src){ document.getElementById("imgPopup").style.display = "flex"; document.getElementById("popupImg").src = src; }
    function closeImg(){ document.getElementById("imgPopup").style.display = "none"; }

    const bdayMonth = 9; 
    const bdayDate = 1;  
    function updateBirthdayUI() {
        let today = new Date();
        if (today.getMonth() === bdayMonth && today.getDate() === bdayDate) {
            document.getElementById("bdayText").innerText = "🎉 Open me 😭❤️";
            return; 
        }
        let bday = new Date(today.getFullYear(), bdayMonth, bdayDate);
        if (today > bday) bday.setFullYear(today.getFullYear() + 1);
        let diff = bday - today;
        let days = Math.floor(diff / (1000 * 60 * 60 * 24));
        let hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        document.getElementById("bdayText").innerText = `🎂 Available in ${days}d ${hours}h`;
    }
    function openGift() {
        let today = new Date();
        if (today.getMonth() === bdayMonth && today.getDate() === bdayDate) window.location.href = "birthday.html";
        else alert("Not yet… 🤍"); 
    }
    updateBirthdayUI(); setInterval(updateBirthdayUI, 60000);

    window.addEventListener("scroll", ()=>{
        document.querySelectorAll(".memoryBlock").forEach(el=>{
            let rect = el.getBoundingClientRect();
            if(rect.top < window.innerHeight - 50) el.classList.add("show");
        });
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, push, get, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkvm3uc_KyxZFTM1UR2_p15HQZ6XydCrE",
      authDomain: "memories111-8bdaa.firebaseapp.com",
      projectId: "memories111-8bdaa",
      storageBucket: "memories111-8bdaa.appspot.com",
      messagingSenderId: "628477390391",
      appId: "1:628477390391:web:31821b5ae426e5a96f59b2",
      databaseURL: "https://memories111-8bdaa-default-rtdb.asia-southeast1.firebasedatabase.app"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.trackVisit = async function(){
        const visitRef = ref(db, "stats/visitCount");
        get(visitRef).then((snapshot) => {
            let count = snapshot.exists() ? snapshot.val() : 0;
            set(visitRef, count + 1);
        });
    }

    window.saveMessage = async function() {
        const msgInput = document.getElementById("userMsg");
        let message = msgInput.value;
        if(message.trim() === "") return alert("Write something first! 😂");
        const finalMsg = isTester ? "[TEST] " + message : message;
        try {
            await push(ref(db, "messages"), { text: finalMsg, time: new Date().toLocaleString() });
            alert("Message sent! ❤️");
            msgInput.value = "";
        } catch (e) { alert("Error sending."); }
    }

    window.showVisits = function() {
        document.getElementById("adminTitle").innerText = "Suraj's Visit Count";
        onValue(ref(db, "stats/visitCount"), (snapshot) => {
            document.getElementById("adminContent").innerHTML = `<h1 style='color:#ffd700; font-size: 50px;'>${snapshot.val() || 0}</h1><p>Times opened (Real visits only)</p>`;
        });
    }

    window.showAllMessages = function() {
        document.getElementById("adminTitle").innerText = "Inbox (Notes from him)";
        onValue(ref(db, "messages"), (snapshot) => {
            let html = "";
            if(snapshot.exists()){
                const data = snapshot.val();
                Object.keys(data).reverse().forEach(key => {
                    const isTestMsg = data[key].text.includes("[TEST]");
                    const style = isTestMsg ? "color: #888; font-style: italic; opacity: 0.7;" : "color: #fff; font-weight: bold; background: rgba(255,154,158,0.2); border-radius:10px; margin-bottom:10px; padding:10px;";
                    html += `<div class="msgItem" style="${style}"><strong>[${data[key].time}]</strong><br>${data[key].text}</div>`;
                });
            } else { html = "No messages yet."; }
            document.getElementById("adminContent").innerHTML = html;
        });
    }
</script>
